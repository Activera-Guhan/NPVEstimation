<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPV Estimation — Activera Consulting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 40%, #b8d4f0 0%, #8ab2da 40%, #6fa0cc 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 8vw, 120px);
      color: #1A3A5C;
      letter-spacing: 2px;
      text-align: center;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.12);
    }

    #btn-start {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 2.2vw, 28px);
      letter-spacing: 1.5px;
      color: #1A3A5C;
      background: #7BADD4;
      border: 2.5px solid #1A3A5C;
      border-radius: 60px;
      padding: 16px 64px;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
      box-shadow: 0 3px 14px rgba(0,0,0,0.18);
      text-decoration: none;
      display: inline-block;
    }
    #btn-start:hover { background: #92bfe0; transform: scale(1.03); }

    #brand-logo {
      width: clamp(100px, 14vw, 180px);
      height: auto;
      opacity: 0.92;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>NPV ESTIMATION</h1>
  <a id="btn-start" href="control.html">FIND YOUR NPV NOW!</a>
  <img id="brand-logo" src="activera_consulting_logo.png" alt="Activera Consulting" />
</body>
</html>
